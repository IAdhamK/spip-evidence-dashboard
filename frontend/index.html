<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPIP Evidence Dashboard</title>
    <style>
      .app-boot-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        color: #172026;
        background: #f6f7f9;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .app-boot-screen strong,
      .app-boot-screen span { display: block; }
      .app-boot-screen span { margin-top: 8px; color: #60717c; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-screen" data-app-boot-screen>
        <div>
          <strong>Memuat aplikasi penilaian SPIP…</strong>
          <span>Mohon tunggu sebentar.</span>
        </div>
      </div>
    </div>
    <script>
      window.setTimeout(function () {
        var bootScreen = document.querySelector("[data-app-boot-screen]");
        if (!bootScreen) return;
        bootScreen.querySelector("strong").textContent = "Antarmuka belum berhasil dimuat";
        bootScreen.querySelector("span").textContent = "Muat ulang halaman tanpa cache dengan Cmd + Shift + R.";
      }, 10000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
