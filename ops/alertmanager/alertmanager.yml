route:
  receiver: local-observability
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: local-observability

# Tambahkan email_configs, slack_configs, atau webhook_configs pada environment
# produksi. File default ini sengaja tidak mengirim data keluar.
