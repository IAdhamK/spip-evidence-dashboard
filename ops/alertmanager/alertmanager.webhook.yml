route:
  receiver: organization-webhook
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: organization-webhook
    webhook_configs:
      - url_file: /run/secrets/alertmanager_webhook_url
        send_resolved: true
        max_alerts: 0

# Opt-in production profile. The mounted secret file must contain one HTTPS URL.
# Never commit the organization webhook URL into this repository.
