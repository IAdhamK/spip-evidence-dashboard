upstream spip_backend {
    server backend:8000;
    keepalive 32;
}

upstream oauth2_proxy {
    server oauth2-proxy:4180;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;

    # This endpoint is internal so clients cannot mint an authenticated identity.
    location = /_oauth2_auth {
        internal;
        proxy_pass http://oauth2_proxy/oauth2/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Reviewer-Identity "";
        proxy_set_header X-Reviewer-Roles "";
    }

    location / {
        auth_request /_oauth2_auth;
        auth_request_set $reviewer_identity $upstream_http_x_auth_request_email;
        auth_request_set $reviewer_roles $upstream_http_x_auth_request_groups;

        # Always replace, never forward, client-supplied identity or role headers.
        proxy_set_header X-Reviewer-Identity $reviewer_identity;
        proxy_set_header X-Reviewer-Roles $reviewer_roles;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_pass http://spip_backend;
    }
}
